<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="340" y="30" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Home network (Limerick)</text>

<!-- External: Cribl -->
<rect x="40" y="44" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="105" y="70" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Cribl Stream</text>

<!-- External: Prometheus -->
<rect x="200" y="44" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="265" y="70" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Prometheus</text>

<!-- External: Browser -->
<rect x="360" y="44" width="110" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="415" y="70" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Browser</text>

<!-- Arrows: home → ingress -->
<line x1="105" y1="88" x2="105" y2="148" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="265" y1="88" x2="265" y2="148" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="415" y1="88" x2="415" y2="148" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>

<text x="60" y="124" font-size="12" fill="#5F5E5A">POST /v1/ingest/*</text>
<text x="222" y="124" font-size="12" fill="#5F5E5A">POST /api/v1/write</text>
<text x="390" y="124" font-size="12" fill="#5F5E5A">HTTP</text>

<!-- Azure resource group container -->
<rect x="20" y="148" width="640" height="555" rx="20" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="175" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">rg-nm2-homelab (UK South)</text>

<!-- NGINX Ingress -->
<rect x="60" y="194" width="560" height="56" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="320" y="214" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">NGINX ingress controller</text>
<text x="320" y="234" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Public IP via Azure LB + basic auth + nip.io DNS</text>

<!-- Arrows: ingress → services -->
<line x1="140" y1="250" x2="140" y2="310" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="250" x2="340" y2="310" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="530" y1="250" x2="530" y2="310" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>

<!-- AKS cluster container -->
<rect x="50" y="280" width="580" height="340" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="304" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">AKS cluster (Standard_B2s × 1)</text>

<!-- Namespace container (dashed) -->
<rect x="70" y="316" width="540" height="290" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="340" y="334" text-anchor="middle" font-size="12" fill="#5F5E5A">namespace: nm2-homelab</text>

<!-- Ingest pod -->
<rect x="86" y="348" width="160" height="76" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="166" y="370" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">nm2-ingest</text>
<text x="166" y="390" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">FastAPI :8080</text>
<text x="166" y="406" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">init: db-provisioner</text>

<!-- Prometheus pod -->
<rect x="260" y="348" width="160" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="368" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">nm2-prometheus</text>
<text x="340" y="388" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">remote-write :9090</text>

<!-- Grafana pod -->
<rect x="436" y="348" width="160" height="56" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text x="516" y="368" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#72243E">nm2-grafana</text>
<text x="516" y="388" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993556">:3000</text>

<!-- PostgreSQL pod -->
<rect x="86" y="456" width="160" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="166" y="476" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#27500A">nm2-postgres</text>
<text x="166" y="496" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11">PG 16 + PVC 1Gi</text>

<!-- Prometheus PVC -->
<rect x="296" y="456" width="90" height="36" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="341" y="478" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">PVC 1Gi</text>

<!-- Grafana PVC -->
<rect x="472" y="456" width="90" height="36" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="517" y="478" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">PVC 1Gi</text>

<!-- Workload identity SA -->
<rect x="86" y="540" width="220" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="196" y="554" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">ServiceAccount</text>
<text x="196" y="572" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">nm2-workload-identity</text>

<!-- SecretProviderClass -->
<rect x="326" y="540" width="220" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="436" y="554" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">SecretProviderClass</text>
<text x="436" y="572" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">KV CSI driver</text>

<!-- Arrows: ingest → postgres -->
<line x1="166" y1="424" x2="166" y2="454" stroke="#3B6D11" stroke-width="1" marker-end="url(#arrow)"/>
<!-- Arrows: grafana → postgres -->
<path d="M480 404 L480 440 L248 440 L248 454" fill="none" stroke="#3B6D11" stroke-width="1" marker-end="url(#arrow)"/>
<!-- Arrows: grafana → prometheus -->
<line x1="436" y1="376" x2="422" y2="376" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)"/>
<!-- Arrows: prometheus → PVC -->
<line x1="340" y1="404" x2="340" y2="454" stroke="#5F5E5A" stroke-width="0.8" marker-end="url(#arrow)"/>
<!-- Arrows: grafana → PVC -->
<line x1="516" y1="404" x2="516" y2="454" stroke="#5F5E5A" stroke-width="0.8" marker-end="url(#arrow)"/>

<!-- ACR -->
<rect x="40" y="640" width="140" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="110" y="666" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">ACR</text>

<!-- Key Vault -->
<rect x="270" y="640" width="140" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="666" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Key Vault</text>

<!-- Managed Identity -->
<rect x="500" y="640" width="140" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="570" y="666" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Managed ID</text>

<!-- Arrow: SA → Managed ID (federated credential) -->
<path d="M196 584 L196 624 L570 624 L570 638" fill="none" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>
<text x="380" y="618" font-size="12" fill="#0F6E56">OIDC federation</text>

<!-- Arrow: SPC → Key Vault -->
<line x1="436" y1="584" x2="380" y2="638" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Arrow: Managed ID → Key Vault -->
<line x1="500" y1="662" x2="412" y2="662" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
<text x="456" y="654" font-size="12" fill="#185FA5">secrets access</text>

<!-- Arrow: ACR → AKS (image pull) -->
<path d="M110 640 L110 624 L340 624 L340 620" fill="none" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
<text x="200" y="618" font-size="12" fill="#185FA5">image pull</text>

</svg>
