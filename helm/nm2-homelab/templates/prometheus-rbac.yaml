{{/* RBAC for Prometheus kubernetes_sd_configs */}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nm2-prometheus
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nm2.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nm2-prometheus
  labels:
    {{- include "nm2.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "endpoints", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nm2-prometheus
  labels:
    {{- include "nm2.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nm2-prometheus
subjects:
  - kind: ServiceAccount
    name: nm2-prometheus
    namespace: {{ .Values.global.namespace }}
