apiVersion: v1
kind: ConfigMap
metadata:
  name: nm2-prometheus-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nm2.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    scrape_configs:
      # Prometheus self-monitoring
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:{{ .Values.prometheus.port }}"]

      # Ingest API metrics (FastAPI exposes via /metrics if prometheus-fastapi-instrumentator is added)
      - job_name: "ingest-api"
        static_configs:
          - targets: ["nm2-ingest.{{ .Values.global.namespace }}.svc:{{ .Values.ingestApi.port }}"]
        metrics_path: /metrics
        scrape_interval: 15s

      # Kubernetes service discovery — scrape pods with prometheus annotations
      # Pods should have:
      #   annotations:
      #     prometheus.io/scrape: "true"
      #     prometheus.io/port: "<port>"
      #     prometheus.io/path: "/metrics"
      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Values.global.namespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
