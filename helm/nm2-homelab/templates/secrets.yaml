{{/*
  ==========================================================================
  SECRET MANAGEMENT — MIGRATION GUIDE FOR PRODUCTION (AZURE)
  ==========================================================================

  This template creates standard Kubernetes Secrets populated from values.yaml.
  For production, replace this file with ONE of the following approaches.
  No other templates need to change — they all reference secrets by the same
  names and keys defined here.

  --------------------------------------------------------------------------
  OPTION A: Azure Key Vault CSI Driver (SecretProviderClass)
  --------------------------------------------------------------------------
  Prerequisites:
    - AKS cluster with Key Vault CSI driver addon enabled
    - Managed Identity (or Service Principal) with GET access to the Key Vault
    - Secrets pre-created in Key Vault with names matching the objectName fields

  Replace this file with:

  apiVersion: secrets-store.csi.x-k8s.io/v1
  kind: SecretProviderClass
  metadata:
    name: nm2-keyvault-secrets
    namespace: {{ .Values.global.namespace }}
  spec:
    provider: azure
    parameters:
      usePodIdentity: "false"
      useVMManagedIdentity: "true"              # ← managed identity
      userAssignedIdentityID: "<CLIENT_ID>"     # ← identity client ID
      keyvaultName: "<KEYVAULT_NAME>"
      tenantId: "<TENANT_ID>"
      objects: |
        array:
          - |
            objectName: nm2-postgres-admin-uri
            objectType: secret
          - |
            objectName: nm2-ingest-db-uri
            objectType: secret
          - |
            objectName: nm2-ingest-password
            objectType: secret
          - |
            objectName: nm2-grafana-db-uri
            objectType: secret
          - |
            objectName: nm2-grafana-password
            objectType: secret
          - |
            objectName: nm2-grafana-admin-user
            objectType: secret
          - |
            objectName: nm2-grafana-admin-password
            objectType: secret
    secretObjects:
      - secretName: nm2-db-credentials          # ← MUST match this name
        type: Opaque
        data:
          - objectName: nm2-postgres-admin-uri
            key: POSTGRES_ADMIN_URI
          - objectName: nm2-ingest-db-uri
            key: INGEST_DB_URI
          - objectName: nm2-ingest-password
            key: INGEST_PASSWORD
          - objectName: nm2-grafana-db-uri
            key: GRAFANA_DB_URI
          - objectName: nm2-grafana-password
            key: GRAFANA_PASSWORD
      - secretName: nm2-grafana-credentials     # ← MUST match this name
        type: Opaque
        data:
          - objectName: nm2-grafana-admin-user
            key: GF_SECURITY_ADMIN_USER
          - objectName: nm2-grafana-admin-password
            key: GF_SECURITY_ADMIN_PASSWORD

  NOTE: With CSI driver, at least one pod must mount the SecretProviderClass
  volume for the k8s Secrets to be created. Add this to the ingest Deployment:

    volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: nm2-keyvault-secrets

  --------------------------------------------------------------------------
  OPTION B: External Secrets Operator (ExternalSecret CRD)
  --------------------------------------------------------------------------
  Prerequisites:
    - External Secrets Operator installed (helm install external-secrets ...)
    - ClusterSecretStore or SecretStore configured for Azure Key Vault
    - Managed Identity with GET access to the Key Vault

  Replace this file with:

  apiVersion: external-secrets.io/v1beta1
  kind: ExternalSecret
  metadata:
    name: nm2-db-credentials
    namespace: {{ .Values.global.namespace }}
  spec:
    refreshInterval: 1h
    secretStoreRef:
      name: azure-keyvault          # ← your SecretStore name
      kind: ClusterSecretStore
    target:
      name: nm2-db-credentials      # ← MUST match this name
      creationPolicy: Owner
    data:
      - secretKey: POSTGRES_ADMIN_URI
        remoteRef:
          key: nm2-postgres-admin-uri
      - secretKey: INGEST_DB_URI
        remoteRef:
          key: nm2-ingest-db-uri
      - secretKey: INGEST_PASSWORD
        remoteRef:
          key: nm2-ingest-password
      - secretKey: GRAFANA_DB_URI
        remoteRef:
          key: nm2-grafana-db-uri
      - secretKey: GRAFANA_PASSWORD
        remoteRef:
          key: nm2-grafana-password
  ---
  apiVersion: external-secrets.io/v1beta1
  kind: ExternalSecret
  metadata:
    name: nm2-grafana-credentials
    namespace: {{ .Values.global.namespace }}
  spec:
    refreshInterval: 1h
    secretStoreRef:
      name: azure-keyvault
      kind: ClusterSecretStore
    target:
      name: nm2-grafana-credentials  # ← MUST match this name
      creationPolicy: Owner
    data:
      - secretKey: GF_SECURITY_ADMIN_USER
        remoteRef:
          key: nm2-grafana-admin-user
      - secretKey: GF_SECURITY_ADMIN_PASSWORD
        remoteRef:
          key: nm2-grafana-admin-password

  --------------------------------------------------------------------------
  KEY CONTRACT — DO NOT CHANGE THESE NAMES/KEYS
  --------------------------------------------------------------------------
  Secret: nm2-db-credentials
    Keys: POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB,
          POSTGRES_ADMIN_URI, INGEST_PASSWORD, INGEST_DB_URI,
          GRAFANA_PASSWORD, GRAFANA_DB_URI

  Secret: nm2-grafana-credentials
    Keys: GF_SECURITY_ADMIN_USER, GF_SECURITY_ADMIN_PASSWORD

  All Deployments reference these exact names and keys.
  ==========================================================================
*/}}

{{/*
  HOMELAB IMPLEMENTATION — direct Kubernetes Secrets from values.yaml
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: nm2-db-credentials
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nm2.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secrets.postgres.adminUser | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgres.adminPassword | quote }}
  POSTGRES_DB: {{ .Values.secrets.postgres.database | quote }}
  POSTGRES_ADMIN_URI: "postgresql://{{ .Values.secrets.postgres.adminUser }}:{{ .Values.secrets.postgres.adminPassword }}@nm2-postgres.{{ .Values.global.namespace }}.svc:{{ .Values.postgres.port }}/{{ .Values.secrets.postgres.database }}"
  INGEST_PASSWORD: {{ .Values.secrets.ingest.password | quote }}
  INGEST_DB_URI: "postgresql://{{ .Values.secrets.ingest.user }}:{{ .Values.secrets.ingest.password }}@nm2-postgres.{{ .Values.global.namespace }}.svc:{{ .Values.postgres.port }}/{{ .Values.secrets.postgres.database }}"
  GRAFANA_PASSWORD: {{ .Values.secrets.grafana.dbPassword | quote }}
  GRAFANA_DB_URI: "postgresql://{{ .Values.secrets.grafana.dbUser }}:{{ .Values.secrets.grafana.dbPassword }}@nm2-postgres.{{ .Values.global.namespace }}.svc:{{ .Values.postgres.port }}/{{ .Values.secrets.postgres.database }}"
---
apiVersion: v1
kind: Secret
metadata:
  name: nm2-grafana-credentials
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nm2.labels" . | nindent 4 }}
type: Opaque
stringData:
  GF_SECURITY_ADMIN_USER: {{ .Values.secrets.grafana.adminUser | quote }}
  GF_SECURITY_ADMIN_PASSWORD: {{ .Values.secrets.grafana.adminPassword | quote }}
