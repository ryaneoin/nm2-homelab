{{/*
  Azure Key Vault CSI integration — production mode (keyvault.enabled: true).

  Creates:
    1. ServiceAccount with workload identity annotation (federated to managed identity)
    2. SecretProviderClass that maps Key Vault secrets → k8s Secrets

  The CSI driver creates the k8s Secrets (nm2-db-credentials, nm2-grafana-credentials)
  when a pod mounts the secrets-store volume. All Deployments that need secrets
  mount this volume and use the ServiceAccount below.

  Prerequisites (handled by deploy-azure.sh):
    - AKS with --enable-oidc-issuer --enable-workload-identity
    - Azure Key Vault CSI driver addon enabled
    - User-assigned managed identity with "Key Vault Secrets User" role
    - Federated credential linking this SA to the managed identity

  Key Vault secret names expected:
    nm2-postgres-user, nm2-postgres-password, nm2-postgres-db,
    nm2-postgres-admin-uri, nm2-ingest-password, nm2-ingest-db-uri,
    nm2-grafana-password, nm2-grafana-db-uri,
    nm2-grafana-admin-user, nm2-grafana-admin-password
*/}}
{{- if .Values.keyvault.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nm2-workload-identity
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nm2.labels" . | nindent 4 }}
    azure.workload.identity/use: "true"
  annotations:
    azure.workload.identity/client-id: {{ .Values.keyvault.clientId | quote }}
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: nm2-keyvault-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nm2.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: {{ .Values.keyvault.clientId | quote }}
    keyvaultName: {{ .Values.keyvault.name | quote }}
    tenantId: {{ .Values.keyvault.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: nm2-postgres-user
          objectType: secret
        - |
          objectName: nm2-postgres-password
          objectType: secret
        - |
          objectName: nm2-postgres-db
          objectType: secret
        - |
          objectName: nm2-postgres-admin-uri
          objectType: secret
        - |
          objectName: nm2-ingest-password
          objectType: secret
        - |
          objectName: nm2-ingest-db-uri
          objectType: secret
        - |
          objectName: nm2-grafana-password
          objectType: secret
        - |
          objectName: nm2-grafana-db-uri
          objectType: secret
        - |
          objectName: nm2-grafana-admin-user
          objectType: secret
        - |
          objectName: nm2-grafana-admin-password
          objectType: secret
  secretObjects:
    - secretName: nm2-db-credentials
      type: Opaque
      data:
        - objectName: nm2-postgres-user
          key: POSTGRES_USER
        - objectName: nm2-postgres-password
          key: POSTGRES_PASSWORD
        - objectName: nm2-postgres-db
          key: POSTGRES_DB
        - objectName: nm2-postgres-admin-uri
          key: POSTGRES_ADMIN_URI
        - objectName: nm2-ingest-password
          key: INGEST_PASSWORD
        - objectName: nm2-ingest-db-uri
          key: INGEST_DB_URI
        - objectName: nm2-grafana-password
          key: GRAFANA_PASSWORD
        - objectName: nm2-grafana-db-uri
          key: GRAFANA_DB_URI
    - secretName: nm2-grafana-credentials
      type: Opaque
      data:
        - objectName: nm2-grafana-admin-user
          key: GF_SECURITY_ADMIN_USER
        - objectName: nm2-grafana-admin-password
          key: GF_SECURITY_ADMIN_PASSWORD
{{- end }}
