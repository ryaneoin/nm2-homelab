apiVersion: apps/v1
kind: Deployment
metadata:
  name: nm2-grafana
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nm2.labels" . | nindent 4 }}
    app.kubernetes.io/name: nm2-grafana
spec:
  replicas: {{ .Values.grafana.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: nm2-grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nm2-grafana
        {{- if .Values.keyvault.enabled }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      {{- if .Values.keyvault.enabled }}
      serviceAccountName: nm2-workload-identity
      {{- end }}
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: {{ .Values.grafana.image }}
          ports:
            - containerPort: {{ .Values.grafana.port }}
          envFrom:
            - secretRef:
                name: nm2-grafana-credentials
          env:
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            {{- if .Values.keyvault.enabled }}
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.grafana.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.grafana.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nm2-grafana-data
        - name: datasources
          configMap:
            name: nm2-grafana-datasources
        {{- if .Values.keyvault.enabled }}
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: nm2-keyvault-secrets
        {{- end }}
