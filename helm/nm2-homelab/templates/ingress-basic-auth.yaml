{{/*
  Basic auth secret for NGINX ingress.
  Only rendered when ingress is enabled with nginx + basicAuth.
  The htpasswd data is generated by the deploy script and passed via values.
*/}}
{{- if and .Values.ingress.enabled .Values.ingress.basicAuth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: nm2-basic-auth
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nm2.labels" . | nindent 4 }}
type: Opaque
data:
  auth: {{ .Values.ingress.basicAuth.htpasswd | b64enc }}
{{- end }}
