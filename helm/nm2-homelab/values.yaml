# =============================================================================
# nm2-homelab — Single Values File
# =============================================================================
#
# SECRET MANAGEMENT
# -----------------
# This chart supports two modes, controlled by keyvault.enabled:
#
#   keyvault.enabled: false (default — homelab)
#     Renders standard Kubernetes Secrets from the secrets{} block below.
#
#   keyvault.enabled: true (Azure production)
#     Renders a SecretProviderClass (Azure Key Vault CSI driver) that syncs
#     Key Vault secrets → Kubernetes Secrets with the same names and keys.
#     Uses AKS workload identity for authentication — no client secrets needed.
#     The secrets{} block is ignored; all values come from Key Vault.
#
# In both modes, all Deployments reference the same two k8s Secrets:
#   - nm2-db-credentials
#   - nm2-grafana-credentials
# No Deployment templates change between modes.
#
# =============================================================================

global:
  namespace: nm2-homelab

# ---------------------------------------------------------------------------
# Azure Key Vault CSI integration (disabled by default)
# ---------------------------------------------------------------------------
# deploy-azure.sh populates these values automatically.
# For manual setup: enable the CSI addon and workload identity on AKS,
# create a managed identity with "Key Vault Secrets User" role,
# then fill in the values below.
# ---------------------------------------------------------------------------
keyvault:
  enabled: false
  name: ""                    # e.g. kv-nm2-homelab
  tenantId: ""                # Azure AD tenant ID
  clientId: ""                # Managed identity client ID

# ---------------------------------------------------------------------------
# Secrets — used ONLY when keyvault.enabled is false
# ---------------------------------------------------------------------------
secrets:
  postgres:
    adminUser: postgres
    adminPassword: "CHANGE_ME_pg_admin"
    database: nm2
  ingest:
    user: nm2_ingest
    password: "CHANGE_ME_ingest"
  grafana:
    dbUser: nm2_grafana
    dbPassword: "CHANGE_ME_grafana_ro"
    adminUser: admin
    adminPassword: "CHANGE_ME_grafana_admin"

# ---------------------------------------------------------------------------
# PostgreSQL
# ---------------------------------------------------------------------------
# Production: Remove this section entirely. PostgreSQL is deployed via
# Terraform (Azure Flexible Server) in the primary subscription.
# Update the connection URIs in Key Vault to point at the Azure PG instance.
# ---------------------------------------------------------------------------
postgres:
  image: postgres:16-alpine
  storage:
    size: 5Gi
    storageClass: local-path        # k3s default; AKS uses managed-csi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  port: 5432

# ---------------------------------------------------------------------------
# DB Provisioner (init container)
# ---------------------------------------------------------------------------
dbProvisioner:
  image: nm2-homelab/db-provisioner:latest

# ---------------------------------------------------------------------------
# Ingest API
# ---------------------------------------------------------------------------
ingestApi:
  image: nm2-homelab/ingest-api:latest
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  pool:
    min: 2
    max: 10

# ---------------------------------------------------------------------------
# Prometheus
# ---------------------------------------------------------------------------
prometheus:
  image: prom/prometheus:v2.51.2
  replicas: 1
  port: 9090
  storage:
    size: 5Gi
    storageClass: local-path        # AKS: managed-csi
  retention: 30d
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ---------------------------------------------------------------------------
# Grafana
# ---------------------------------------------------------------------------
grafana:
  image: grafana/grafana:11.4.0
  replicas: 1
  port: 3000
  storage:
    size: 1Gi
    storageClass: local-path
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Ingress — assumes Traefik (k3s default)
# Production: swap className to nginx or appgw and adjust annotations.
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: traefik
  ingestApi:
    host: ingest.nm2.local
  grafana:
    host: grafana.nm2.local
  prometheus:
    host: prometheus.nm2.local
