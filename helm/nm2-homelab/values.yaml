# =============================================================================
# nm2-homelab — Single Values File
# =============================================================================
#
# SECRET MANAGEMENT
# -----------------
# This chart supports two modes, controlled by keyvault.enabled:
#
#   keyvault.enabled: false (default — homelab)
#     Renders standard Kubernetes Secrets from the secrets{} block below.
#
#   keyvault.enabled: true (Azure production)
#     Renders a SecretProviderClass (Azure Key Vault CSI driver) that syncs
#     Key Vault secrets → Kubernetes Secrets with the same names and keys.
#     Uses AKS workload identity for authentication — no client secrets needed.
#     The secrets{} block is ignored; all values come from Key Vault.
#
# In both modes, all Deployments reference the same two k8s Secrets:
#   - nm2-db-credentials
#   - nm2-grafana-credentials
# No Deployment templates change between modes.
#
# =============================================================================

global:
  namespace: nm2-homelab

# ---------------------------------------------------------------------------
# Azure Key Vault CSI integration (disabled by default)
# ---------------------------------------------------------------------------
keyvault:
  enabled: false
  name: ""
  tenantId: ""
  clientId: ""

# ---------------------------------------------------------------------------
# Secrets — used ONLY when keyvault.enabled is false
# ---------------------------------------------------------------------------
secrets:
  postgres:
    adminUser: postgres
    adminPassword: "CHANGE_ME_pg_admin"
    database: nm2
  ingest:
    user: nm2_ingest
    password: "CHANGE_ME_ingest"
  grafana:
    dbUser: nm2_grafana
    dbPassword: "CHANGE_ME_grafana_ro"
    adminUser: admin
    adminPassword: "CHANGE_ME_grafana_admin"

# ---------------------------------------------------------------------------
# PostgreSQL
# ---------------------------------------------------------------------------
postgres:
  image: postgres:16-alpine
  storage:
    size: 5Gi
    storageClass: local-path
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  port: 5432

# ---------------------------------------------------------------------------
# DB Provisioner (init container)
# ---------------------------------------------------------------------------
dbProvisioner:
  image: nm2-homelab/db-provisioner:latest

# ---------------------------------------------------------------------------
# Ingest API
# ---------------------------------------------------------------------------
ingestApi:
  image: nm2-homelab/ingest-api:latest
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  pool:
    min: 2
    max: 10

# ---------------------------------------------------------------------------
# Prometheus
# ---------------------------------------------------------------------------
# remoteWriteReceiver: enables --web.enable-remote-write-receiver so remote
#   Prometheus instances or agents can push metrics via POST /api/v1/write.
#   Protected by basic auth when exposed via nginx ingress.
# ---------------------------------------------------------------------------
prometheus:
  image: prom/prometheus:v2.51.2
  replicas: 1
  port: 9090
  remoteWriteReceiver: false
  storage:
    size: 5Gi
    storageClass: local-path
  retention: 30d
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ---------------------------------------------------------------------------
# Grafana
# ---------------------------------------------------------------------------
grafana:
  image: grafana/grafana:11.4.0
  replicas: 1
  port: 3000
  storage:
    size: 1Gi
    storageClass: local-path
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
# className: traefik (k3s default) or nginx (AKS)
# basicAuth: when enabled with nginx, ingest API and Prometheus require
#   HTTP Basic Auth. Grafana is excluded (has its own login).
#   htpasswd: pre-generated htpasswd string (deploy script generates this)
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: traefik
  basicAuth:
    enabled: false
    htpasswd: ""
  ingestApi:
    host: ingest.nm2.local
  grafana:
    host: grafana.nm2.local
  prometheus:
    host: prometheus.nm2.local
